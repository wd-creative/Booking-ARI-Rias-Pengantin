<!DOCTYPE html>

<html>
<head>
  <meta charset="UTF-8">
  <title>Booking Rias Pengantin</title>

  <style>
    body {
      font-family: Arial;
      background: linear-gradient(to right, #ff758c, #ff7eb3);
      color: #333;
      text-align: center;
      padding: 40px;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 12px;
      max-width: 400px;
      margin: auto;
      box-shadow: 0 5px 20px rgba(0,0,0,0.2);
    }

    h2 {
      margin-bottom: 20px;
      color: #ff4d6d;
    }

    input, select {
      width: 90%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    button {
      padding: 10px 20px;
      margin: 10px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }

    .cek {
      background: #ff4d6d;
      color: white;
    }

    .booking {
      background: #28a745;
      color: white;
    }

    #status {
      margin-top: 15px;
      font-weight: bold;
    }
  </style>

</head>

<body>

<div class="card">
  <h2>💄 Booking Rias Pengantin</h2>

<input id="nama" placeholder="Nama"><br> <input id="wa" placeholder="WhatsApp (08xxx)"><br> <input id="tanggal" type="date"><br>

  <select id="layanan">
    <option>Rias Pengantin</option>
    <option>Dekorasi</option>
    <option>Sewa Baju</option>
  </select><br>

<button class="cek" onclick="cek()">Cek Tanggal</button> <button class="booking" onclick="booking()">Booking</button>

  <p id="status"></p>
</div>

<script>
const URL = "https://script.google.com/macros/s/AKfycbxbPnHNBV1g2Ani8sp91UHorOzdwgEan4cC32XGkgKruHPx7XAO4kdgyUxcDlsJ6dR5/exec";
const API_KEY = "SECRET123";

// =======================
// CEK TANGGAL
// =======================
async function cek() {
  try {
    const tanggal = document.getElementById("tanggal").value;

    const res = await fetch(URL, {
      method: "POST",
      body: JSON.stringify({
        api_key: API_KEY,
        action: "check",
        tanggal: tanggal
      })
    });

    const data = await res.json();

    document.getElementById("status").innerText =
      data.available ? "✅ Tersedia" : "❌ Penuh";

  } catch (err) {
    document.getElementById("status").innerText = "Error: " + err;
  }
}

// =======================
// BOOKING
// =======================
async function booking() {
  try {
    const res = await fetch(URL, {
      method: "POST",
      body: JSON.stringify({
        api_key: API_KEY,
        action: "create",
        nama: document.getElementById("nama").value,
        wa: document.getElementById("wa").value,
        tanggal: document.getElementById("tanggal").value,
        layanan: document.getElementById("layanan").value,
        lokasi: "Semarang"
      })
    });

    const data = await res.json();
    document.getElementById("status").innerText = data.message;

  } catch (err) {
    document.getElementById("status").innerText = "Error: " + err;
  }
}
</script>

</body>
</html>
