<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Booking Rias Pengantin</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #fff0f5;
}

.header {
  position: relative;
  height: 250px;
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;

  background: url('https://images.unsplash.com/photo-1522673607200-164d1b6ce486') center/cover no-repeat;
}

.header::after {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(255, 77, 109, 0.7);
}

.header-content {
  position: relative;
  z-index: 2;
}

.header h1 {
  margin: 0;
  font-size: 26px;
  letter-spacing: 1px;
}

.header p {
  margin-top: 5px;
  font-size: 14px;
  opacity: 0.9;
}

.container {
  padding: 20px;
  max-width: 500px;
  margin: auto;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.1);
}

input, textarea, select {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 8px;
  border: 1px solid #ccc;
  font-size: 14px;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 8px;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
}

.cek {
  background: #ff4d6d;
  color: white;
}

.booking {
  background: #28a745;
  color: white;
}

#status {
  text-align: center;
  margin-top: 15px;
  font-weight: bold;
}
</style>

</head>

<body>

<div class="header">
  <div class="header-content">
    <h1>💍 ARI Rias Pengantin</h1>
    <p>Mewujudkan Hari Bahagiamu Lebih Istimewa</p>
  </div>
</div>

<div class="container">
  <div class="card">

```
<h3>Form Booking</h3>

<input id="nama" placeholder="Nama Lengkap">
<input id="alamat" placeholder="Alamat">
<input id="wa" placeholder="No. WhatsApp (08xxx)">
<input id="tanggal" type="date">

<select id="layanan">
  <option>Paket Pengantin Lengkap (Make Up, Dekorasi, Baju, Hiburan)</option>
  <option>Paket Pengantin tanpa Hiburan</option>
  <option>Rias Pengantin</option>
  <option>Sewa Dekorasi</option>
  <option>Sewa Wardrobe / Kostum</option>
  <option>Sewa Hiburan</option>
</select>

<select id="mobil">
  <option value="">Sewa Mobil?</option>
  <option value="Ya">Ya</option>
  <option value="Tidak">Tidak</option>
</select>

<textarea id="pesan" placeholder="Pesan / Catatan Tambahan"></textarea>

<button class="cek" onclick="cek()">Cek Ketersediaan</button>
<button class="booking" onclick="booking()">Booking Sekarang</button>

<p id="status"></p>
```

  </div>
</div>

<script>
const URL = "https://script.google.com/macros/s/AKfycbxbPnHNBV1g2Ani8sp91UHorOzdwgEan4cC32XGkgKruHPx7XAO4kdgyUxcDlsJ6dR5/exec";
const API_KEY = "SECRET123";

async function cek() {
  const tanggal = document.getElementById("tanggal").value;

  const res = await fetch(URL, {
    method: "POST",
    body: JSON.stringify({
      api_key: API_KEY,
      action: "check",
      tanggal: tanggal
    })
  });

  const data = await res.json();
  document.getElementById("status").innerText =
    data.available ? "✅ Tersedia" : "❌ Penuh";
}

async function booking() {
  const res = await fetch(URL, {
    method: "POST",
    body: JSON.stringify({
      api_key: API_KEY,
      action: "create",
      nama: document.getElementById("nama").value,
      alamat: document.getElementById("alamat").value,
      wa: document.getElementById("wa").value,
      tanggal: document.getElementById("tanggal").value,
      layanan: document.getElementById("layanan").value,
      mobil: document.getElementById("mobil").value,
      notes: document.getElementById("pesan").value,
      lokasi: "Semarang"
    })
  });

  const data = await res.json();
  document.getElementById("status").innerText = data.message;
}
</script>

</body>
</html>
