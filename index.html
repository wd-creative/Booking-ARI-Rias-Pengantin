<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Booking Rias Pengantin</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #fff0f5;
    }

    .header {
  position: relative;
  height: 250px;
  color: #f8fafc;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  overflow: hidden;
  background:
    linear-gradient(135deg, rgba(2, 6, 23, 0.84), rgba(15, 23, 42, 0.58)),
    url('https://i.ibb.co.com/gFPmm3F5/DSC09493.jpg') center/cover no-repeat;
}

.header::before {
  content: "";
  position: absolute;
  inset: 0;
  background:
    radial-gradient(circle at top left, rgba(59, 130, 246, 0.18), transparent 34%),
    radial-gradient(circle at bottom right, rgba(168, 85, 247, 0.14), transparent 30%);
  pointer-events: none;
}

.header::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, rgba(2, 6, 23, 0.08), rgba(2, 6, 23, 0.38));
  pointer-events: none;
}

.header-content {
  position: relative;
  z-index: 2;
  padding: 0 16px;
  max-width: 90%;
}

.header h1 {
  margin: 0;
  font-size: 26px;
  letter-spacing: 1px;
  text-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
}

.header p {
  margin-top: 5px;
  font-size: 14px;
  opacity: 0.92;
}

    .container {
      padding: 20px;
      max-width: 500px;
      margin: auto;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
    }

    input, textarea, select {
      width: 100%;
      box-sizing: border-box;
      padding: 12px;
      margin: 8px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    .cek {
  background: linear-gradient(180deg, #1e293b, #0f172a);
  color: #f8fafc;
  border: 1px solid rgba(148, 163, 184, 0.22);
  box-shadow: 0 12px 28px rgba(0, 0, 0, 0.22);
  transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
}

.cek:hover {
  transform: translateY(-2px);
  background: linear-gradient(180deg, #263248, #111827);
  box-shadow: 0 16px 34px rgba(0, 0, 0, 0.28);
}

.booking {
  background: linear-gradient(135deg, #7c5c2e, #d6b56d);
  color: #111827;
  border: 1px solid rgba(255, 255, 255, 0.14);
  box-shadow: 0 14px 30px rgba(0, 0, 0, 0.24);
  transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
}

.booking:hover {
  transform: translateY(-2px);
  background: linear-gradient(135deg, #8a6632, #e1c57d);
  box-shadow: 0 18px 38px rgba(0, 0, 0, 0.3);
}

    #status {
      text-align: center;
      margin-top: 15px;
      font-weight: bold;
      min-height: 24px;
    }
  </style>
</head>

<body>
  <div class="header">
    <div class="header-content">
      <h1>💍 ARI Rias Pengantin</h1>
      <p>Mewujudkan Hari Bahagiamu Lebih Istimewa</p>
    </div>
  </div>

  <div class="container">
    <div class="card">
      <h3>Form Booking</h3>

      <input id="nama" placeholder="Nama Lengkap">
      <input id="alamat" placeholder="Alamat">
      <input id="lokasi" placeholder="Kota / Lokasi Acara">
      <input id="wa" placeholder="No. WhatsApp (08xxx)">
      <input id="tanggal" type="date">

      <select id="layanan">
        <option value="Paket Pengantin Lengkap (Make Up, Dekorasi, Baju, Solo Organ)">Paket Pengantin Lengkap (Make Up, Dekorasi, Baju, Solo Organ)</option>
        <option value="Paket Pengantin tanpa Solo Organ">Paket Pengantin tanpa Solo Organ</option>
        <option value="Rias Pengantin / Make Up">Rias Pengantin / Make Up</option>
        <option value="Sewa Dekorasi">Sewa Dekorasi</option>
        <option value="Sewa Wardrobe / Kostum">Sewa Wardrobe / Kostum</option>
        <option value="Sewa Solo Organ">Sewa Solo Organ</option>
      </select>

      <select id="mobil">
        <option value="">Sewa Mobil?</option>
        <option value="Ya">Ya</option>
        <option value="Tidak">Tidak</option>
      </select>

      <textarea id="pesan" placeholder="Pesan / Catatan Tambahan"></textarea>

      <button class="cek" onclick="cek()">Cek Ketersediaan</button>
      <button class="booking" onclick="booking()">Booking Sekarang</button>

      <p id="status"></p>
    </div>
  </div>

  <script>
    const URL = "https://script.google.com/macros/s/AKfycbxbPnHNBV1g2Ani8sp91UHorOzdwgEan4cC32XGkgKruHPx7XAO4kdgyUxcDlsJ6dR5/exec";
    const API_KEY = "SECRET123";

    async function cek() {
      const tanggal = document.getElementById("tanggal").value;
      const status = document.getElementById("status");

      if (!tanggal) {
        status.innerText = "Silakan pilih tanggal dulu.";
        return;
      }

      try {
        status.innerText = "Memeriksa ketersediaan...";

        const res = await fetch(URL, {
          method: "POST",
          headers: {
            "Content-Type": "text/plain;charset=utf-8"
          },
          body: JSON.stringify({
            api_key: API_KEY,
            action: "check",
            tanggal: tanggal
          })
        });

        const data = await res.json();
        status.innerText = data.available
          ? `✅ Tersedia (${data.remaining} slot)`
          : "❌ Penuh";
      } catch (err) {
        status.innerText = "Gagal cek ketersediaan.";
      }
    }

    async function booking() {
      const status = document.getElementById("status");

      const nama = document.getElementById("nama").value.trim();
      const alamat = document.getElementById("alamat").value.trim();
      const lokasi = document.getElementById("lokasi").value.trim();
      const wa = document.getElementById("wa").value.trim();
      const tanggal = document.getElementById("tanggal").value;
      const layanan = document.getElementById("layanan").value;
      const mobil = document.getElementById("mobil").value;
      const notes = document.getElementById("pesan").value.trim();

      if (!nama || !alamat || !lokasi || !wa || !tanggal || !layanan) {
        status.innerText = "Lengkapi data terlebih dahulu.";
        return;
      }

      try {
        status.innerText = "Mengirim booking...";

        const res = await fetch(URL, {
          method: "POST",
          headers: {
            "Content-Type": "text/plain;charset=utf-8"
          },
          body: JSON.stringify({
            api_key: API_KEY,
            action: "create",
            nama: nama,
            alamat: alamat,
            lokasi: lokasi,
            wa: wa,
            layanan: layanan,
            tanggal: tanggal,
            mobil: mobil,
            notes: notes
          })
        });

        const data = await res.json();

        if (data.success) {
          status.innerText = "✅ " + data.message;
        } else {
          status.innerText = "❌ " + (data.message || "Booking gagal");
        }
      } catch (err) {
        status.innerText = "Gagal mengirim booking.";
      }
    }
  </script>
</body>
</html>
