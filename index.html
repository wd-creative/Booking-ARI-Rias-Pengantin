<!DOCTYPE html>

<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Booking Rias Pengantin</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: linear-gradient(to bottom, #ff758c, #ff7eb3);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: white;
      width: 100%;
      max-width: 420px;
      padding: 20px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    h2 {
      text-align: center;
      color: #ff4d6d;
      margin-bottom: 20px;
    }

    input, select {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    .cek {
      background: #ff4d6d;
      color: white;
    }

    .booking {
      background: #28a745;
      color: white;
    }

    #status {
      text-align: center;
      margin-top: 15px;
      font-weight: bold;
    }

    @media (max-width: 480px) {
      .card {
        margin: 10px;
        padding: 15px;
      }
    }
  </style>

</head>

<body>

<div class="card">
  <h2>💄 Booking Rias Pengantin</h2>

  <input id="nama" placeholder="Nama">
  <input id="wa" placeholder="WhatsApp (08xxx)">
  <input id="tanggal" type="date">

  <select id="layanan">
    <option>Rias Pengantin</option>
    <option>Dekorasi</option>
    <option>Sewa Baju</option>
  </select>

<button class="cek" onclick="cek()">Cek Tanggal</button> <button class="booking" onclick="booking()">Booking</button>

  <p id="status"></p>
</div>

<script>
const URL = "https://script.google.com/macros/s/AKfycbxbPnHNBV1g2Ani8sp91UHorOzdwgEan4cC32XGkgKruHPx7XAO4kdgyUxcDlsJ6dR5/exec";
const API_KEY = "SECRET123";

async function cek() {
  try {
    const tanggal = document.getElementById("tanggal").value;

    const res = await fetch(URL, {
      method: "POST",
      body: JSON.stringify({
        api_key: API_KEY,
        action: "check",
        tanggal: tanggal
      })
    });

    const data = await res.json();

    document.getElementById("status").innerText =
      data.available ? "✅ Tersedia" : "❌ Penuh";

  } catch (err) {
    document.getElementById("status").innerText = "Error: " + err;
  }
}

async function booking() {
  try {
    const res = await fetch(URL, {
      method: "POST",
      body: JSON.stringify({
        api_key: API_KEY,
        action: "create",
        nama: document.getElementById("nama").value,
        wa: document.getElementById("wa").value,
        tanggal: document.getElementById("tanggal").value,
        layanan: document.getElementById("layanan").value,
        lokasi: "Semarang"
      })
    });

    const data = await res.json();
    document.getElementById("status").innerText = data.message;

  } catch (err) {
    document.getElementById("status").innerText = "Error: " + err;
  }
}
</script>

</body>
</html>
